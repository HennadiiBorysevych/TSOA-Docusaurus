name: Docs — TSOA + Docusaurus

on:
  push:
    branches: [main]
    paths:
      - 'src/**'

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install API dependencies
        run: npm install

      - name: Generate OpenAPI spec (TSOA)
        run: npm run docs:generate

      - name: Validate spec
        run: npx @redocly/cli lint swagger.json --skip-rule=no-empty-servers --skip-rule=info-license --skip-rule=operation-summary

      - name: Commit updated swagger.json
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'docs: regenerate swagger spec'
          file_pattern: swagger.json

      - name: Install Docusaurus dependencies
        working-directory: website
        run: npm install

      - name: Build Docusaurus site
        working-directory: website
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: website/build
          publish_branch: gh-pages
